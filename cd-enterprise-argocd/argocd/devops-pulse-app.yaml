apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-pulse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/jumptotech/cd-enterprise-gitops.git
    targetRevision: main
    path: apps/devops-pulse
  destination:
    server: https://kubernetes.default.svc
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
